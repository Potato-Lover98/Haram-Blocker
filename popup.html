<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
  :root{--g:#1faa59;--gd:#0f7a3d;--ink:#16241b;--cream:#f3fbf5}
  *{box-sizing:border-box;margin:0;font-family:"Segoe UI",system-ui,sans-serif}
  body{width:320px;background:var(--cream);color:var(--ink)}
  .top{background:linear-gradient(135deg,var(--g),var(--gd));color:#fff;padding:16px;text-align:center}
  .top h1{font-size:1.2rem;letter-spacing:1px}
  .top .ar{font-family:"Traditional Arabic","Amiri",serif;font-size:1rem;opacity:.9}
  .top p{font-size:.72rem;opacity:.9;margin-top:2px}
  .body{padding:14px}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;
    background:#fff;border:1.5px solid var(--g);border-radius:12px;padding:12px 14px;margin-bottom:12px}
  .toggle-row b{font-size:.95rem}
  .sw{position:relative;width:48px;height:26px}
  .sw input{display:none}
  .sw .track{position:absolute;inset:0;background:#ccc;border-radius:20px;transition:.2s;cursor:pointer}
  .sw .track::after{content:"";position:absolute;top:3px;left:3px;width:20px;height:20px;background:#fff;border-radius:50%;transition:.2s}
  .sw input:checked + .track{background:var(--g)}
  .sw input:checked + .track::after{transform:translateX(22px)}
  .stats{display:flex;gap:8px;margin-bottom:12px}
  .stat{flex:1;background:#fff;border:1px solid var(--g);border-radius:10px;padding:8px;text-align:center}
  .stat b{display:block;font-size:1.3rem;color:var(--gd)}
  .stat span{font-size:.68rem;color:#6a8c78}
  h3{font-size:.85rem;color:var(--gd);margin:10px 0 6px}
  .add{display:flex;gap:6px;margin-bottom:8px}
  .add input{flex:1;padding:8px 10px;border:1.5px solid var(--g);border-radius:8px;outline:none}
  .add button{background:var(--g);color:#fff;border:none;border-radius:8px;padding:8px 12px;cursor:pointer;font-weight:700}
  .list{max-height:130px;overflow:auto;display:flex;flex-direction:column;gap:5px}
  .item{display:flex;justify-content:space-between;align-items:center;background:#fff;
    border:1px solid #d6ecdc;border-radius:8px;padding:6px 10px;font-size:.85rem}
  .item button{background:none;border:none;color:#d9534f;cursor:pointer;font-size:1rem}
  .empty{font-size:.78rem;color:#9ab5a6;text-align:center;padding:8px}
  .foot{text-align:center;font-size:.68rem;color:#9ab5a6;padding:8px}
</style>
</head>
<body>
  <div class="top">
    <h1>🛡️ Ghassil <span class="ar">غَسِّل</span></h1>
    <p>Haram Blocker</p>
  </div>
  <div class="body">
    <div class="toggle-row">
      <b>Protection</b>
      <label class="sw"><input type="checkbox" id="enabled"><span class="track"></span></label>
    </div>
    <div class="stats">
      <div class="stat"><b id="site-count">0</b><span>blocked sites</span></div>
      <div class="stat"><b id="kw-count">0</b><span>filtered words</span></div>
    </div>
    <h3>Block a website</h3>
    <div class="add">
      <input id="site-input" placeholder="e.g. example.com" autocomplete="off">
      <button id="add-site">Add</button>
    </div>
    <div class="list" id="site-list"></div>
  </div>
  <div class="foot">Built for the sake of Allah · Ghassil</div>
  <script src="lists.js"></script>
  <script src="popup.js"></script>
</body>
</html>
